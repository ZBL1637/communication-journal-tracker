<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      const basePath = window.location.pathname.replace(/404\.html$/, '');
      window.location.replace(`${basePath}#/`);
    </script>
  </body>
</html>
